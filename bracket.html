<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bracket · Sittab World Cup 2026</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
<header id="nav"></header>
<main>
  <div class="player-head">
    <h1 id="pname"></h1>
    <span class="points" id="ppoints"></span>
    <span class="rank" id="prank"></span>
    <span class="points" style="color:var(--muted)" id="ppotential"></span>
  </div>
  <p class="sub" id="psub"></p>

  <h2>Knockout picks</h2>
  <div id="ko"></div>
  <div class="legend">
    <span><span class="dot" style="background:var(--accent)"></span>correct pick</span>
    <span><span class="dot" style="background:var(--wrong)"></span>wrong</span>
    <span><span class="dot" style="background:var(--dead)"></span>no longer possible</span>
    <span>◄ picked winner</span>
  </div>

  <h2>Best third-placed teams picked to advance</h2>
  <div class="thirds-row" id="thirds"></div>

  <h2>Group predictions</h2>
  <p class="note">2 pts per team correctly in the top two (order-agnostic);
    the 3rd-place row scores via the “advancing thirds” picks above.</p>
  <div class="group-grid" id="groups"></div>
</main>
<script type="module" src="js/bracket-page.js"></script>
</body>
</html>
