<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bracket · Sittab World Cup 2026</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="assets/sittab_logo.png">
</head>
<body>
<header id="nav"></header>
<main>
  <div class="player-head">
    <select id="player-switch" aria-label="Choose bracket"></select>
    <span class="points" id="ppoints"></span>
    <span class="rank" id="prank"></span>
    <span class="points" style="color:var(--gray-70)" id="ppotential"></span>
  </div>
  <p class="sub" id="psub"></p>

  <h2>Knockout picks</h2>
  <div id="ko"></div>
  <div class="legend">
    <span><span class="dot" style="background:#1A1A1A"></span>correct pick (bold)</span>
    <span><span class="dot" style="background:#9A9A9A"></span>wrong (struck)</span>
    <span><span class="dot" style="background:#C2C2C8"></span>no longer possible (faded)</span>
    <span>◄ picked winner</span>
  </div>

  <h2>Best third-placed teams picked to advance</h2>
  <div class="thirds-row" id="thirds"></div>

  <h2>Group predictions</h2>
  <p class="note">2 pts per team correctly in the top two (order-agnostic);
    the 3rd-place row scores via the “advancing thirds” picks above.</p>
  <div class="group-grid" id="groups"></div>
</main>
<script type="module" src="js/bracket-page.js"></script>
</body>
</html>
