name: Sync results from ESPN

on:
  schedule:
    # Off-peak minutes: GitHub often skips scheduled runs at :00/:30.
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: sync
        run: node scripts/sync_results.mjs
      - name: Validate updated data
        if: steps.sync.outputs.changed == 'true'
        run: node scripts/test_engine.mjs
      - name: Commit and push
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git commit -m "Sync results: ${{ steps.sync.outputs.summary }}"
          git pull --rebase origin main
          git push origin main
      - name: Trigger Pages deploy
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
